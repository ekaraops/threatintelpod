<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-brand">
        <img src="{{ .Site.BaseURL }}images/logo.svg" alt="ThreatIntelPod" class="logo-svg" style="width:28px;height:28px;">
        <span class="logo-text">ThreatIntelPod</span>
        <p class="footer-tagline">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-links">
        <h4>Navigate</h4>
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ now.Year }} ThreatIntelPod. Summaries are AI-generated and may contain inaccuracies.</p>
    </div>
  </div>
</footer>

<script>
document.querySelector('.mobile-menu-toggle')?.addEventListener('click', function() {
  document.querySelector('.site-nav').classList.toggle('open');
  this.classList.toggle('active');
});
</script>
