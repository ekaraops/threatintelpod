<header class="site-header">
  <div class="container">
    <a href="{{ .Site.BaseURL }}" class="site-logo">
      <img src="{{ .Site.BaseURL }}images/logo.svg" alt="ThreatIntelPod" class="logo-svg">
      <span class="logo-text">ThreatIntelPod</span>
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <a href="{{ .Site.BaseURL }}episodes/index.xml" class="nav-link nav-rss" title="Subscribe to RSS Feed">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="6.18" cy="17.82" r="2.18"/><path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/></svg>
      </a>
      <a href="#newsletter-form" class="nav-subscribe-btn">Subscribe</a>
    </nav>
    <button class="mobile-menu-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
