<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="g3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="micBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a40"/>
      <stop offset="50%" stop-color="#0f1a2b"/>
      <stop offset="100%" stop-color="#1a2a40"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="micClip">
      <rect x="235" y="80" width="130" height="160" rx="65"/>
    </clipPath>
  </defs>

  <!-- Background ambient glow -->
  <ellipse cx="300" cy="220" rx="280" ry="220" fill="url(#glow1)" filter="url(#blur2)"/>
  <ellipse cx="320" cy="260" rx="150" ry="150" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Sound wave rings behind mic -->
  <ellipse cx="300" cy="180" rx="200" ry="80" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.08"/>
  <ellipse cx="300" cy="180" rx="250" ry="100" fill="none" stroke="#00ff88" stroke-width="0.6" opacity="0.05"/>
  <ellipse cx="300" cy="180" rx="160" ry="65" fill="none" stroke="#00b4d8" stroke-width="0.8" opacity="0.08"/>

  <!-- === MICROPHONE === -->
  <g transform="translate(0, 10)">
    <!-- Mic shadow -->
    <ellipse cx="305" cy="420" rx="60" ry="12" fill="#000" opacity="0.3" filter="url(#blur1)"/>

    <!-- Mic stand base -->
    <ellipse cx="300" cy="410" rx="50" ry="10" fill="#0d1520" stroke="url(#g2)" stroke-width="1"/>
    <ellipse cx="300" cy="407" rx="45" ry="8" fill="#111b2b"/>
    <rect x="296" y="330" width="8" height="80" fill="url(#micBody)" stroke="url(#g2)" stroke-width="0.8"/>

    <!-- Mic arm / yoke mount -->
    <path d="M260 180 Q260 310 296 330" fill="none" stroke="#1a2a40" stroke-width="10" stroke-linecap="round"/>
    <path d="M340 180 Q340 310 304 330" fill="none" stroke="#1a2a40" stroke-width="10" stroke-linecap="round"/>
    <path d="M260 180 Q260 310 296 330" fill="none" stroke="url(#g2)" stroke-width="1" opacity="0.5"/>
    <path d="M340 180 Q340 310 304 330" fill="none" stroke="url(#g2)" stroke-width="1" opacity="0.5"/>

    <!-- Yoke screws -->
    <circle cx="260" cy="180" r="6" fill="#111b2b" stroke="url(#g2)" stroke-width="1"/>
    <circle cx="260" cy="180" r="2" fill="#00ff88" opacity="0.5"/>
    <circle cx="340" cy="180" r="6" fill="#111b2b" stroke="url(#g2)" stroke-width="1"/>
    <circle cx="340" cy="180" r="2" fill="#00b4d8" opacity="0.5"/>

    <!-- Microphone body (capsule) -->
    <rect x="235" y="80" width="130" height="160" rx="65" fill="url(#micBody)" stroke="url(#g2)" stroke-width="2"/>

    <!-- Mic grille pattern (horizontal lines) -->
    <g clip-path="url(#micClip)" opacity="0.4">
      <line x1="240" y1="90" x2="360" y2="90" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="98" x2="360" y2="98" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="106" x2="360" y2="106" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="114" x2="360" y2="114" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="122" x2="360" y2="122" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="130" x2="360" y2="130" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="138" x2="360" y2="138" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="146" x2="360" y2="146" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="154" x2="360" y2="154" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="162" x2="360" y2="162" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="170" x2="360" y2="170" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="178" x2="360" y2="178" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="186" x2="360" y2="186" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="194" x2="360" y2="194" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="202" x2="360" y2="202" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="210" x2="360" y2="210" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="218" x2="360" y2="218" stroke="#00ff88" stroke-width="0.5"/>
      <line x1="240" y1="226" x2="360" y2="226" stroke="#00ff88" stroke-width="0.5"/>
    </g>

    <!-- Mic grille inner glow -->
    <rect x="240" y="85" width="120" height="150" rx="60" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.2"/>

    <!-- LED indicator on mic -->
    <circle cx="300" cy="235" r="3" fill="#00ff88" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- === SOUND WAVES emanating from mic === -->
  <!-- Left side waves -->
  <path d="M220 130 Q200 160 220 190" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M200 115 Q170 160 200 205" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
  </path>
  <path d="M180 100 Q140 160 180 220" fill="none" stroke="#00ff88" stroke-width="1" stroke-linecap="round" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
  </path>

  <!-- Right side waves -->
  <path d="M380 130 Q400 160 380 190" fill="none" stroke="#00b4d8" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.5s" begin="0.1s" repeatCount="indefinite"/>
  </path>
  <path d="M400 115 Q430 160 400 205" fill="none" stroke="#00b4d8" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </path>
  <path d="M420 100 Q460 160 420 220" fill="none" stroke="#00b4d8" stroke-width="1" stroke-linecap="round" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </path>

  <!-- === FLOATING SECURITY DATA NODES === -->
  <!-- Node: shield icon top-left -->
  <g transform="translate(90, 100)">
    <circle cx="0" cy="0" r="22" fill="#0d1520" stroke="#00ff88" stroke-width="1.2" opacity="0.8"/>
    <path d="M0 -9 L8 -5 L8 3 C8 8 4 12 0 14 C-4 12 -8 8 -8 3 L-8 -5 Z" fill="none" stroke="#00ff88" stroke-width="1.2"/>
    <line x1="22" y1="5" x2="140" y2="60" stroke="#00ff88" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Node: lock icon top-right -->
  <g transform="translate(510, 90)">
    <circle cx="0" cy="0" r="20" fill="#0d1520" stroke="#00b4d8" stroke-width="1.2" opacity="0.8"/>
    <rect x="-6" y="-2" width="12" height="10" rx="1.5" fill="none" stroke="#00b4d8" stroke-width="1.2"/>
    <path d="M-4 -2 L-4 -6 C-4 -10 4 -10 4 -6 L4 -2" fill="none" stroke="#00b4d8" stroke-width="1.2"/>
    <circle cx="0" cy="3" r="1.5" fill="#00b4d8"/>
    <line x1="-20" y1="5" x2="-140" y2="70" stroke="#00b4d8" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-8" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Node: eye/monitor icon mid-left -->
  <g transform="translate(80, 280)">
    <circle cx="0" cy="0" r="18" fill="#0d1520" stroke="#a78bfa" stroke-width="1.2" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="9" ry="5" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#a78bfa" opacity="0.6"/>
    <line x1="18" y1="-8" x2="150" y2="-90" stroke="#a78bfa" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-8" dur="1.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Node: signal icon mid-right -->
  <g transform="translate(520, 270)">
    <circle cx="0" cy="0" r="18" fill="#0d1520" stroke="#00ff88" stroke-width="1.2" opacity="0.8"/>
    <path d="M-4 4 Q0 -8 4 4" fill="none" stroke="#00ff88" stroke-width="1"/>
    <path d="M-7 4 Q0 -14 7 4" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="5" r="1.5" fill="#00ff88"/>
    <line x1="-18" y1="-8" x2="-150" y2="-80" stroke="#00ff88" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-8" dur="1.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Small floating particles -->
  <circle cx="150" cy="180" r="2" fill="#00ff88" opacity="0.4">
    <animate attributeName="cy" values="180;170;180" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="170" r="2" fill="#00b4d8" opacity="0.4">
    <animate attributeName="cy" values="170;160;170" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="350" r="1.5" fill="#a78bfa" opacity="0.3">
    <animate attributeName="cy" values="350;340;350" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="360" r="1.5" fill="#00ff88" opacity="0.3">
    <animate attributeName="cy" values="360;350;360" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Audio waveform bar visualization at bottom -->
  <g transform="translate(150, 440)" opacity="0.15">
    <rect x="0" y="-8" width="3" height="16" rx="1.5" fill="#00ff88">
      <animate attributeName="height" values="16;28;16" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-8;-14;-8" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="-12" width="3" height="24" rx="1.5" fill="#00ff88">
      <animate attributeName="height" values="24;10;24" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-12;-5;-12" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="16" y="-6" width="3" height="12" rx="1.5" fill="#00ff88">
      <animate attributeName="height" values="12;30;12" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-6;-15;-6" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="-15" width="3" height="30" rx="1.5" fill="#00b4d8">
      <animate attributeName="height" values="30;14;30" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-15;-7;-15" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="32" y="-10" width="3" height="20" rx="1.5" fill="#00b4d8">
      <animate attributeName="height" values="20;32;20" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-10;-16;-10" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="40" y="-5" width="3" height="10" rx="1.5" fill="#00ff88">
      <animate attributeName="height" values="10;22;10" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-5;-11;-5" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <!-- Mirror right side -->
    <rect x="250" y="-8" width="3" height="16" rx="1.5" fill="#00b4d8">
      <animate attributeName="height" values="16;28;16" dur="0.85s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-8;-14;-8" dur="0.85s" repeatCount="indefinite"/>
    </rect>
    <rect x="258" y="-12" width="3" height="24" rx="1.5" fill="#00b4d8">
      <animate attributeName="height" values="24;10;24" dur="0.65s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-12;-5;-12" dur="0.65s" repeatCount="indefinite"/>
    </rect>
    <rect x="266" y="-6" width="3" height="12" rx="1.5" fill="#00b4d8">
      <animate attributeName="height" values="12;30;12" dur="1.05s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-6;-15;-6" dur="1.05s" repeatCount="indefinite"/>
    </rect>
    <rect x="274" y="-15" width="3" height="30" rx="1.5" fill="#00ff88">
      <animate attributeName="height" values="30;14;30" dur="0.75s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-15;-7;-15" dur="0.75s" repeatCount="indefinite"/>
    </rect>
    <rect x="282" y="-10" width="3" height="20" rx="1.5" fill="#00ff88">
      <animate attributeName="height" values="20;32;20" dur="0.95s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-10;-16;-10" dur="0.95s" repeatCount="indefinite"/>
    </rect>
    <rect x="290" y="-5" width="3" height="10" rx="1.5" fill="#00b4d8">
      <animate attributeName="height" values="10;22;10" dur="1.15s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-5;-11;-5" dur="1.15s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Faint text decorations -->
  <text x="70" y="60" fill="#00ff88" opacity="0.06" font-family="monospace" font-size="9">THREAT INTEL</text>
  <text x="440" y="450" fill="#00b4d8" opacity="0.06" font-family="monospace" font-size="9">PODCAST FEED</text>
</svg>
