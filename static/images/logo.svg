<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Modern shield with pulse/signal lines -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M24 4 L40 12 L40 24 C40 34 32 42 24 46 C16 42 8 34 8 24 L8 12 Z" fill="url(#innerGrad)" stroke="url(#shieldGrad)" stroke-width="1.5"/>
  <!-- Inner hexagon tech pattern -->
  <path d="M24 14 L31 18.5 L31 27.5 L24 32 L17 27.5 L17 18.5 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="1" opacity="0.6"/>
  <!-- Signal/pulse waves radiating out -->
  <path d="M24 23 Q28 19 32 21" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M24 23 Q30 17 36 20" fill="none" stroke="#00ff88" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 23 Q20 19 16 21" fill="none" stroke="#00b4d8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M24 23 Q18 17 12 20" fill="none" stroke="#00b4d8" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="24" cy="23" r="2.5" fill="url(#shieldGrad)"/>
  <!-- Small circuit nodes -->
  <circle cx="17" cy="18.5" r="1.2" fill="#00ff88" opacity="0.7"/>
  <circle cx="31" cy="18.5" r="1.2" fill="#00b4d8" opacity="0.7"/>
  <circle cx="17" cy="27.5" r="1.2" fill="#00b4d8" opacity="0.7"/>
  <circle cx="31" cy="27.5" r="1.2" fill="#00ff88" opacity="0.7"/>
</svg>
